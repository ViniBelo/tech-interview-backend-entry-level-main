x-app: &app
    build: .
    volumes:
        - .:/rails
    depends_on:
        - db
        - redis
    environment:
        - DATABASE_URL=${DATABASE_URL}/${DATABASE_NAME_DEVELOPMENT}
        - REDIS_URL=redis://redis:6379/0

services:
    db:
        image: postgres:16-alpine
        environment:
          - POSTGRES_USER=${POSTGRES_USER}
          - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
        ports:
            - '5432:5432'
        volumes:
            - postgres_data:/var/lib/postgresql/data
    redis:
        image: redis:7.0.15-alpine
        ports:
        - '6379:6379'
        volumes:
        - redis_data:/data
    web:
        <<: *app
        command: ./bin/rails server -b 0.0.0.0
        ports:
            - 3000:3000
    sidekiq:
        <<: *app
        command: bundle exec sidekiq
    test:
        build: .
        command: sh -c "bundle exec rails db:drop db:create db:migrate db:seed && bundle exec rspec"
        volumes:
            - .:/rails
        depends_on:
            - db
            - redis
        environment:
            - DATABASE_URL=${DATABASE_URL}/${DATABASE_NAME_TEST}
            - REDIS_URL=redis://redis:6379/0
            - RAILS_ENV=test
volumes:
    postgres_data:
    redis_data:
